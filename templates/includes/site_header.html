{% load static %}

<section class="announcement-banner" data-announcement-banner>
    <div class="container">
        <div class="announcement-banner__inner">
            <p class="announcement-banner__text">
                Instant access to digital poster editions — no shipping required.
            </p>

            <button
                type="button"
                class="announcement-banner__close"
                aria-label="Close announcement"
                data-announcement-close
            >
                <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                >
                    <path d="M6 6l12 12"></path>
                    <path d="M18 6l-12 12"></path>
                </svg>
            </button>
        </div>
    </div>
</section>

<header class="site-header">
    <div class="container">
        <div class="site-header__inner">
            <a href="{% url 'home' %}" class="site-logo">
                <img 
                    src="{% static 'images/branding/cuw-logo-full.webp' %}" alt="Cities Under Watch"
                    class="site-logo__full">
                <img 
                    src="{% static 'images/branding/cuw-logo-icon.webp' %}" alt="Cities Under Watch"
                    class="site-logo__icon">
            </a>

            <nav class="site-nav site-nav--desktop" aria-label="Primary navigation">
                <ul class="site-nav__list">
                    <li><a href="{% url 'product_list' %}">Shop</a></li>
                    <li><a href="#">Collections</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Support</a></li>
                </ul>
            </nav>

            <div class="site-header__actions site-header__actions--desktop">
                <a href="{% url 'account_login' %}" class="header-action-link">
                    <span class="header-action-link__icon" aria-hidden="true">
                        <svg 
                            viewBox="0 0 24 24" 
                            fill="none" 
                            stroke="currentColor" 
                            stroke-width="1.8" 
                            stroke-linecap="round" 
                            stroke-linejoin="round"
                        >
                            <circle cx="12" cy="8" r="3.25"></circle>
                            <path 
                                d="M6.5 18c1.2-2.3 3.2-3.5 5.5-3.5s4.3 1.2 5.5 3.5">
                            </path>
                        </svg>
                    </span>
                    <span class="header-action-link__label">
                        Account
                    </span>
                </a>
                <a href="#" class="header-action-link">
                    <span class="header-action-link__icon" aria-hidden="true">
                        <svg 
                            viewBox="0 0 24 24" 
                            fill="none" 
                            stroke="currentColor" 
                            stroke-width="1.8" 
                            stroke-linecap="round" 
                            stroke-linejoin="round"
                        >
                            <path d="M6 7h12l-1 11H7L6 7Z"></path>
                            <path d="M9 7a3 3 0 0 1 6 0"></path>
                        </svg>
                    </span>
                    <span class="header-action-link__label">
                        Bag
                    </span>
                </a>
            </div>

            <div class="site-header__actions site-header__actions--mobile">
                <a href="#" class="header-action-link" aria-label="View bag">
                    <span class="header-action-link__icon" aria-hidden="true">
                        <svg 
                            viewBox="0 0 24 24" 
                            fill="none" 
                            stroke="currentColor" 
                            stroke-width="1.8" 
                            stroke-linecap="round" 
                            stroke-linejoin="round"
                        >
                            <path d="M6 7h12l-1 11H7L6 7Z"></path>
                            <path d="M9 7a3 3 0 0 1 6 0"></path>
                        </svg>
                    </span>
                </a>

                <button 
                    type="button" 
                    class="menu-toggle" 
                    aria-label="Open menu"
                    aria-expanded="false"
                    aria-controls="mobile-menu"
                    data-mobile-menu-toggle
                >
                    <span class="header-action-link__icon" aria-hidden="true">
                        <svg 
                            viewBox="0 0 24 24" 
                            fill="none" 
                            stroke="currentColor" 
                            stroke-width="1.8" 
                            stroke-linecap="round"
                        >
                            <path d="M4 7h16"></path>
                            <path d="M4 12h16"></path>
                            <path d="M4 17h16"></path>
                        </svg>
                    </span>
                </button>
            </div>
        </div>

        <nav 
            id="mobile-menu"
            class="mobile-menu"
            aria-label="Mobile navigation"
            hidden
            data-mobile-menu
        >
            <ul class="mobile-menu__list">
                <li><a href="{% url 'product_list' %}">Shop</a></li>
                <li><a href="#">Collections</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Support</a></li>
            </ul>

            <div class="mobile-menu__secondary">
                <a href="{% url 'account_login' %}">Account</a>
                <a href="#">Bag</a>
            </div>
        </nav>
    </div>
</header>
