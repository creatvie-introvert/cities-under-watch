<article class="product-card">
    <a href="{% url 'product_detail' product.slug %}" class="product-card__image-link">
        {% with primary_image=product.images.all|first %}
            {% if primary_image %}
                <img 
                    src="{{ primary_image.image.url }}" alt="{{ primary_image.alt_text|default:product.title }}"
                    class="product-card__image"
                >
            {% else %}
                <div class="image-placeholder">
                    Print image
                </div>
            {% endif %}
        {% endwith %}
    </a>

    <h3 class="product-card__title">
        <a href="{% url 'product_detail' product.slug %}">
            {{ product.title }}
        </a>
    </h3>

    {% if product.short_description %}
        <p class="product-card__description">
            {{ product.short_description }}
        </p>
    {% endif %}

    <p class="product-card__price">
        £{{ product.price }}
    </p>

    <a href="{% url 'product_detail' product.slug %}" class="product-card__action">
        View print
    </a>
</article>
