<aside class="profile-dashboard__nav-card">
    <p class="profile-dashboard__eyebrow">Quick access</p>
    <h2 class="profile-dashboard__card-title">
        Navigate your account
    </h2>
    <p class="profile-dashboard__card-text">
        Find orders, downloads and account settings in one place.
    </p>

    <nav class="profile-dashboard__nav" aria-label="Account navigation">
        <a 
            href="{% url 'profile' %}" class="profile-dashboard__nav-link {% if active_tab == 'dashboard' %} is-active{% endif %}"
            {% if active_tab == 'dashboard' %}aria-current="page"{% endif %}
        >
            Dashboard
        </a>
        <a 
            href="{% url 'profile_orders' %}" class="profile-dashboard__nav-link {% if active_tab == 'orders' %} is-active{% endif %}"
            {% if active_tab == 'orders' %}aria-current="page"{% endif %}
        >
            Orders
        </a>
        <a 
            href="{% url 'profile_downloads' %}" class="profile-dashboard__nav-link {% if active_tab == 'downloads' %} is-active{% endif %}"
            {% if active_tab == 'downloads' %}aria-current="page"{% endif %}
        >
            Downloads
        </a>
        <a 
            href="{% url 'profile_settings' %}" class="profile-dashboard__nav-link {% if active_tab == 'settings' %} is-active{% endif %}"
            {% if active_tab == 'settings' %}aria-current="page"{% endif %}
        >
            Profile settings
        </a>
        <a 
            href="{% url 'account_logout' %}" class="profile-dashboard__nav-link"
        >
            Log out
        </a>
    </nav>
</aside>
